<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>creations - ren's headspace</title>
    
    <link rel="stylesheet" href="https://cdn.cursors-4u.net/cursors/animated/shiny-grey-star-4a7c7422-32.css">
    
    <style>
        /* --- Deep Slate Blue Space Reset --- */
        body {
            background-color: #0b0b14;
            background-image: radial-gradient(circle at center, #1e1d30 0%, #0b0b14 100%);
            color: #d0d0e6;
            font-family: Verdana, Tahoma, sans-serif;
            font-size: 11px;
            margin: 0;
            padding: 0; 
            overflow-x: hidden;
        }

        a { color: #8e8cf0; text-decoration: none; font-weight: bold; }
        a:hover { color: #fff; background-color: #8e8cf0; text-decoration: none; cursor: help; }

        #star-field { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .bg-star { position: absolute; background-color: #fff; border-radius: 50%; animation: twinkle infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.1; transform: scale(0.5); } 100% { opacity: 0.8; transform: scale(1.2); box-shadow: 0 0 4px #fff; } }

        .wrapper {
            width: 750px; margin: 0 auto; min-height: 100vh; 
            background-color: rgba(15, 15, 25, 0.8);
            border-left: 1px dotted #5c5a8a; border-right: 1px dotted #5c5a8a;
            padding: 30px 20px; box-sizing: border-box; z-index: 10; position: relative;
        }

        .header { text-align: center; border-bottom: 1px dashed #48476e; padding-bottom: 15px; margin-bottom: 25px; }
        .header h1 { font-size: 24px; color: #c4c3f5; letter-spacing: 3px; text-shadow: 0 0 8px #5c5a8a; margin: 5px 0; font-weight: normal; }
        
        .nav-bar { text-align: center; margin-bottom: 30px; word-spacing: 15px; }
        .nav-bar a { font-size: 12px; }

        /* --- Gallery Grid --- */
        .gallery-container { width: 100%; margin-top: 20px; }
        
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
        }

        .gallery-item {
            background-color: rgba(51, 50, 82, 0.6); 
            border: 1px solid #48476e; padding: 8px; text-align: center;
            transition: border-color 0.2s, background-color 0.2s;
        }
        .gallery-item:hover { border-color: #8e8cf0; background-color: rgba(92, 90, 138, 0.6); cursor: pointer; }

        .gallery-thumb {
            width: 100%; aspect-ratio: 1 / 1; object-fit: cover;
            border: 1px dotted #5c5a8a; margin-bottom: 8px;
        }
        .gallery-title { color: #c4c3f5; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- Fullscreen Lightbox --- */
        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(5, 5, 16, 0.95); z-index: 100000;
            justify-content: center; align-items: center; flex-direction: column;
            padding: 20px; box-sizing: border-box;
            /* Removed the hardcoded cursor here so your shiny star works! */
        }

        /* Top-left X button */
        #lightbox-close {
            position: absolute;
            top: 25px;
            left: 30px;
            background: transparent;
            color: #8e8cf0;
            border: none;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s, text-shadow 0.2s;
            z-index: 100001; /* Ensure it stays above the image */
        }
        #lightbox-close:hover { color: #fff; text-shadow: 0 0 8px #fff; }

        #lightbox-content-box {
            background-color: rgba(30, 29, 48, 0.9); border: 1px dotted #8e8cf0;
            padding: 15px; 
            width: 90vw; /* Massively increased width */
            max-width: 1200px; /* Massively increased max-width */
            max-height: 95vh; /* Allows it to take up most of the screen */
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        #lightbox-img { 
            max-width: 100%; 
            max-height: 80vh; /* Lets the image stretch much taller */
            border: 1px solid #48476e; 
            margin-bottom: 15px; 
        }
        
        #lightbox-title { color: #c4c3f5; font-size: 16px; font-weight: bold; margin-bottom: 5px; text-align: center; }
        #lightbox-desc { color: #d0d0e6; line-height: 1.5; text-align: center; max-width: 800px; font-size: 12px; }

        /* --- Star Mouse Trail --- */
        .trail-particle {
            position: absolute; width: 12px; height: 12px; pointer-events: none; 
            z-index: 999999; /* Increased to ensure it floats above the lightbox */
            transform: translate(-50%, -50%) scale(1); transition: transform 0.6s linear, opacity 0.6s linear;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            filter: drop-shadow(0 0 3px #c4c3f5);
        }
    </style>
</head>
<body>

    <div id="lightbox" onclick="closeLightbox(event)">
        <button id="lightbox-close" onclick="closeLightbox(event)" title="Close">✖</button>
        <div id="lightbox-content-box">
            <img id="lightbox-img" src="" alt="Creation Image">
            <div id="lightbox-title"></div>
            <div id="lightbox-desc"></div>
        </div>
    </div>

    <div id="star-field"></div>

    <div class="wrapper">
        <div class="header">
            <h1>✧ ren's headspace ✧</h1>
        </div>

        <div class="nav-bar">
            [ <a href="index.html">home</a> ] 
            [ <a href="creations.html">creations</a> ] 
            [ <a href="projects.html">projects</a> ] 
            [ <a href="#">downloads</a> ]
        </div>

        <div class="gallery-container" id="gallery-feed">
            <p style="text-align: center; color: #8382ad; margin-top: 50px;">loading creations...</p>
        </div>
    </div>

    <script>
        const starField = document.getElementById('star-field');
        for (let i = 0; i < 100; i++) {
            let star = document.createElement('div');
            star.className = 'bg-star';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            let size = (Math.random() * 2 + 1) + 'px';
            star.style.width = size; star.style.height = size;
            star.style.animationDuration = (Math.random() * 3 + 1.5) + 's';
            star.style.animationDelay = (Math.random() * 5) + 's';
            starField.appendChild(star);
        }

        const colors = ['#ffffff', '#cccccc', '#8e8cf0', '#c4c3f5'];
        let activeParticles = 0; let lastSpawn = 0;
        document.addEventListener('mousemove', function(e) {
            const now = Date.now();
            if (now - lastSpawn < 30 || activeParticles > 30) return;
            lastSpawn = now;
            const particle = document.createElement('div');
            particle.className = 'trail-particle';
            particle.style.left = e.pageX + 'px'; particle.style.top = e.pageY + 'px';
            particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            document.body.appendChild(particle);
            activeParticles++;
            setTimeout(() => { particle.style.transform = 'translate(-50%, -50%) scale(0) translateY(20px) rotate(45deg)'; particle.style.opacity = '0'; }, 10);
            setTimeout(() => { particle.remove(); activeParticles--; }, 600);
        });
    </script>

    <script src="creations.js"></script>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lbImg = document.getElementById('lightbox-img');
        const lbTitle = document.getElementById('lightbox-title');
        const lbDesc = document.getElementById('lightbox-desc');

        function openLightbox(title, imgUrl, desc) {
            lbImg.src = imgUrl;
            lbTitle.innerText = title;
            lbDesc.innerText = desc;
            lightbox.style.display = 'flex';
        }

        function closeLightbox(event) {
            if (event.target === lightbox || event.target.id === 'lightbox-close') {
                lightbox.style.display = 'none';
            }
        }

        const feedContainer = document.getElementById('gallery-feed');
        
        if (typeof creationsData !== 'undefined') {
            feedContainer.innerHTML = '<div class="gallery-grid" id="main-grid"></div>';
            const grid = document.getElementById('main-grid');

            creationsData.forEach(item => {
                const safeTitle = item.title.replace(/'/g, "\\'");
                const safeImg = item.image.replace(/'/g, "\\'");
                const safeDesc = item.description.replace(/'/g, "\\'");

                grid.innerHTML += `
                    <div class="gallery-item" onclick="openLightbox('${safeTitle}', '${safeImg}', '${safeDesc}')">
                        <img src="${item.image}" class="gallery-thumb" alt="${item.title}">
                        <div class="gallery-title">${item.title}</div>
                    </div>
                `;
            });
        } else {
            feedContainer.innerHTML = '<p style="text-align: center; color: #ff9999;">Error: creations.js not found or formatted incorrectly.</p>';
        }
    </script>

</body>
</html>
