<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>horse</title>
    <link rel="icon" type="image/png" href="/img/Icon.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; 
            font-family: 'Nunito', sans-serif;
            color: #4a4a4a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-transform: lowercase; 
        }

        .bg-blur {
            position: fixed;
            top: -5%; left: -5%;
            width: 110%; height: 110%;
            background-image: url('/img/horserace/horserace.png');
            background-size: cover;
            background-position: center;
            filter: blur(6px) saturate(1.2);
            z-index: -1;
        }

        .uma-box {
            background-color: #f7f9fa;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 2px solid #e1e5e8;
            position: relative;
        }

        .creator-container { width: 400px; overflow: hidden; }
        .name-modal { width: 300px; position: absolute; z-index: 100; display: none; overflow: hidden; }
        
        .view-modal {
            width: 280px;
            position: absolute;
            z-index: 200;
            display: none;
            overflow: visible; 
        }

        /* new leaderboard modal styles */
        .list-modal {
            width: 340px;
            position: absolute;
            z-index: 150;
            display: none;
            overflow: visible;
        }

        .list-container {
            max-height: 350px;
            overflow-y: auto;
            background: #ffffff;
            border-bottom-left-radius: 17px;
            border-bottom-right-radius: 17px;
            padding: 10px 0;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 2px solid #e1e5e8;
            cursor: pointer;
            font-weight: 800;
            transition: background-color 0.1s;
        }
        .list-item:last-child { border-bottom: none; }
        .list-item:hover { background-color: #f0f4f8; }
        
        .list-rank { width: 45px; color: #ff6b81; font-weight: 900; }
        .list-name { flex-grow: 1; text-align: left; padding-left: 10px; color: #4a4a4a; }
        .list-likes { color: #ffa502; font-weight: 900; }

        .view-modal .uma-header, .list-modal .uma-header {
            border-top-left-radius: 17px;
            border-top-right-radius: 17px;
        }

        .pasture-ui { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            display: none; 
            z-index: 100;
        }

        .uma-header {
            background-color: #8cc63f; 
            padding: 15px;
            text-align: center;
            border-bottom: 3px solid #77a833;
            position: relative;
        }

        .uma-header h2 {
            margin: 0;
            color: #ffffff;
            font-size: 22px;
            font-weight: 900;
            text-shadow: 1px 1px 0px #5c8a22;
            letter-spacing: 1px;
        }

        .btn-close {
            position: absolute;
            top: -15px;
            left: -15px;
            background: #ff6b81;
            color: #ffffff;
            border: 3px solid #ffffff;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2), 0 3px 0px #d63031;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 300;
            font-family: 'Nunito', sans-serif;
            text-transform: lowercase;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-close:active {
            transform: translateY(3px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.2), 0 0px 0px #d63031;
        }

        .uma-body {
            padding: 20px;
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.5) 0px, rgba(255,255,255,0.5) 10px, transparent 10px, transparent 20px);
            border-bottom-left-radius: 17px;
            border-bottom-right-radius: 17px;
        }

        .horse-preview {
            position: relative;
            width: 100%;
            height: 250px;
            margin: 0 auto 20px auto;
            background: linear-gradient(to bottom, #87ceeb 0%, #87ceeb 60%, #90ee90 60%, #90ee90 100%);
            border-radius: 12px;
            border: 2px solid #d1d8dc;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .layer {
            position: absolute;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            object-fit: contain;
            pointer-events: none;
        }

        .rank-badge {
            position: absolute;
            top: 10px; left: 10px;
            background: #ffb8b8;
            color: #fff;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 900;
            border: 3px solid #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 20;
        }

        .rank-badge.gold { background: #ffcc00; }

        .control-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffffff;
            border: 2px solid #d1d8dc;
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        
        .control-group label { font-size: 15px; font-weight: 800; color: #555; }

        input[type="color"] {
            border: none; background: none; cursor: pointer;
            width: 40px; height: 40px; padding: 0;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 3px solid #d1d8dc; border-radius: 50%; }

        input[type="text"] {
            width: 90%;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid #d1d8dc;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 16px;
            text-align: center;
            outline: none;
            text-transform: lowercase;
        }
        input[type="text"]:focus { border-color: #8cc63f; }

        .btn-save {
            background-color: #8cc63f; 
            color: #ffffff;
            font-family: 'Nunito', sans-serif;
            border: 3px solid #ffffff;
            padding: 12px 20px;
            font-size: 18px;
            font-weight: 900;
            width: 100%;
            border-radius: 30px;
            margin-top: 10px;
            cursor: pointer;
            box-shadow: 0 4px 0px #5c8a22, 0 8px 10px rgba(0,0,0,0.1);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-save:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px #5c8a22, 0 4px 5px rgba(0,0,0,0.1);
        }
        
        .btn-secondary {
            background-color: #ff6b81;
            box-shadow: 0 4px 0px #d63031, 0 8px 10px rgba(0,0,0,0.1);
        }
        .btn-secondary:active { box-shadow: 0 0px 0px #d63031; }

        .btn-like { 
            background-color: #f8c291; 
            box-shadow: 0 4px 0px #e19551, 0 8px 10px rgba(0,0,0,0.1); 
            width: auto;
            padding: 8px 30px;
            display: inline-block;
        }
        .btn-like:active { box-shadow: 0 0px 0px #e19551; }

        .btn-small { 
            width: auto; 
            display: inline-block; 
            margin-right: 5px; 
            padding: 5px 12px; 
            font-size: 13px; 
            text-decoration: none;
        }

        #pasture-area {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 200px;
            display: none;
            pointer-events: none; 
        }

        .horse-sprite {
            position: absolute;
            bottom: -32px; 
            left: 0; 
            width: 230px; 
            height: 230px;
            /* HUGE FIX: disable the big invisible square hitbox! */
            pointer-events: none; 
            will-change: transform; 
        }

        .horse-images {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            will-change: transform; 
        }

        .horse-name {
            position: absolute;
            top: 15px; 
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 900;
            white-space: nowrap;
            z-index: 10;
            /* enable clicking ONLY on the name tag itself! */
            pointer-events: auto; 
            cursor: pointer;
            transition: background 0.1s, transform 0.1s;
        }
        
        .horse-name:hover {
            background: rgba(255, 107, 129, 0.9);
            transform: translateX(-50%) scale(1.1);
        }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position:absolute;">
        <filter id="tint-fur"><feFlood flood-color="#ffffff" result="color"/><feComposite in="color" in2="SourceAlpha" operator="in"/></filter>
        <filter id="tint-hair"><feFlood flood-color="#ff9f43" result="color"/><feComposite in="color" in2="SourceAlpha" operator="in"/></filter>
        <filter id="tint-nose"><feFlood flood-color="#ffb6c1" result="color"/><feComposite in="color" in2="SourceAlpha" operator="in"/></filter>
    </svg>

    <svg width="0" height="0" style="position:absolute;">
        <filter id="tint-fur-view"><feFlood flood-color="#ffffff" result="color"/><feComposite in="color" in2="SourceAlpha" operator="in"/></filter>
        <filter id="tint-hair-view"><feFlood flood-color="#ff9f43" result="color"/><feComposite in="color" in2="SourceAlpha" operator="in"/></filter>
        <filter id="tint-nose-view"><feFlood flood-color="#ffb6c1" result="color"/><feComposite in="color" in2="SourceAlpha" operator="in"/></filter>
    </svg>

    <div class="bg-blur"></div>

    <div class="uma-box creator-container" id="creator-view">
        <div class="uma-header">
            <h2>horse maker</h2>
        </div>
        <div class="uma-body">
            <div class="horse-preview">
                <img src="/img/horserace/horse/horse_basecolor.png" class="layer" style="filter: url(#tint-fur);">
                <img src="/img/horserace/horse/horse_eyewhite.png" class="layer">
                <img src="/img/horserace/horse/horse_baseoutline.png" class="layer">
                <img src="/img/horserace/horse/horse_earcolor.png" class="layer" style="filter: url(#tint-fur);">
                <img src="/img/horserace/horse/horse_earoutline.png" class="layer">
                <img src="/img/horserace/horse/horse_haircolor.png" class="layer" style="filter: url(#tint-hair);">
                <img src="/img/horserace/horse/horse_hairoutline.png" class="layer">
                <img src="/img/horserace/horse/horse_nosecolor.png" class="layer" style="filter: url(#tint-nose);">
            </div>

            <div class="control-group">
                <label>fur color</label>
                <input type="color" id="input-fur" value="#ffffff">
            </div>
            <div class="control-group">
                <label>hair color</label>
                <input type="color" id="input-hair" value="#ff9f43">
            </div>
            <div class="control-group">
                <label>nose color</label>
                <input type="color" id="input-nose" value="#ffb6c1">
            </div>

            <button class="btn-save" onclick="openNameModal()">to the race!</button>
        </div>
    </div>

    <div class="uma-box name-modal" id="name-modal">
        <div class="uma-header">
            <h2>name your horse</h2>
        </div>
        <div class="uma-body" style="text-align: center;">
            <input type="text" id="input-name" placeholder="e.g. silly star" maxlength="15">
            <button class="btn-save" onclick="confirmAndSaveHorse()">confirm</button>
            <button class="btn-save btn-secondary" style="margin-top: 10px;" onclick="closeNameModal()">cancel</button>
        </div>
    </div>

    <div class="uma-box list-modal" id="list-modal">
        <button class="btn-close" onclick="closeListModal()">x</button>
        <div class="uma-header">
            <h2>horse list</h2>
        </div>
        <div class="list-container" id="horse-list-container">
            </div>
    </div>

    <div class="uma-box view-modal" id="view-modal">
        <button class="btn-close" onclick="closeViewModal()">x</button>
        <div class="uma-header">
            <h2 id="view-title">horse name</h2>
        </div>
        <div class="uma-body" style="text-align: center;">
            <div class="horse-preview">
                <div class="rank-badge" id="view-rank">#1</div>
                
                <img src="/img/horserace/horse/horse_basecolor.png" class="layer" style="filter: url(#tint-fur-view);">
                <img src="/img/horserace/horse/horse_eyewhite.png" class="layer">
                <img src="/img/horserace/horse/horse_baseoutline.png" class="layer">
                <img src="/img/horserace/horse/horse_earcolor.png" class="layer" style="filter: url(#tint-fur-view);">
                <img src="/img/horserace/horse/horse_earoutline.png" class="layer">
                <img src="/img/horserace/horse/horse_haircolor.png" class="layer" style="filter: url(#tint-hair-view);">
                <img src="/img/horserace/horse/horse_hairoutline.png" class="layer">
                <img src="/img/horserace/horse/horse_nosecolor.png" class="layer" style="filter: url(#tint-nose-view);">
                
                <img src="/img/horserace/horse/horse_crown.png" class="layer" id="view-crown" style="display: none; z-index: 5;">
            </div>

            <button class="btn-save btn-like" id="view-like-btn" onclick="toggleLike()">👍 0</button>
        </div>
    </div>

    <div class="pasture-ui" id="pasture-ui">
        <a href="/" class="btn-save btn-secondary btn-small">←</a>
        <button class="btn-save btn-small" onclick="editHorse()">edit</button>
        <button class="btn-save btn-small btn-like" style="margin-left: 5px;" onclick="openListModal()">horse list</button>
    </div>

    <div id="pasture-area"></div>

    <script>
        const supabaseUrl = 'https://qtthshswzfssdohtjrif.supabase.co'; 
        const supabaseKey = 'sb_publishable_ix2Ku1eSUTgQhRn1vg_N6g_QO8tFRwp';
        const db = supabase.createClient(supabaseUrl, supabaseKey);

        var creatorView = document.getElementById('creator-view');
        var nameModal = document.getElementById('name-modal');
        var viewModal = document.getElementById('view-modal');
        var listModal = document.getElementById('list-modal');
        var pastureUI = document.getElementById('pasture-ui');
        var pastureArea = document.getElementById('pasture-area');
        
        var inFur = document.getElementById('input-fur');
        var inHair = document.getElementById('input-hair');
        var inNose = document.getElementById('input-nose');
        var inName = document.getElementById('input-name');

        var currentHorseData = null;
        var loadedHorses = []; 
        var horseBeingViewed = null; 

        var savedHorse = localStorage.getItem('mySillyHorse');
        if (savedHorse) {
            currentHorseData = JSON.parse(savedHorse);
            inFur.value = currentHorseData.fur;
            inHair.value = currentHorseData.hair;
            inNose.value = currentHorseData.nose;
            inName.value = currentHorseData.name;
            loadPasture();
        }

        inFur.addEventListener('input', applyCreatorColors);
        inHair.addEventListener('input', applyCreatorColors);
        inNose.addEventListener('input', applyCreatorColors);

        function applyCreatorColors() {
            document.querySelector('#tint-fur feFlood').setAttribute('flood-color', inFur.value);
            document.querySelector('#tint-hair feFlood').setAttribute('flood-color', inHair.value);
            document.querySelector('#tint-nose feFlood').setAttribute('flood-color', inNose.value);
        }
        applyCreatorColors();

        function openNameModal() {
            creatorView.style.pointerEvents = "none";
            creatorView.style.opacity = "0.5";
            nameModal.style.display = "block";
        }

        function closeNameModal() {
            creatorView.style.pointerEvents = "auto";
            creatorView.style.opacity = "1";
            nameModal.style.display = "none";
        }

        async function confirmAndSaveHorse() {
            if (inName.value.trim() === "") {
                alert("please give your horse a name!");
                return;
            }

            let myId = localStorage.getItem('myHorseId');
            if (!myId) {
                myId = crypto.randomUUID ? crypto.randomUUID() : 'id-' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('myHorseId', myId);
            }

            currentHorseData = {
                id: myId,
                name: inName.value,
                fur: inFur.value,
                hair: inHair.value,
                nose: inNose.value
            };
            
            localStorage.setItem('mySillyHorse', JSON.stringify(currentHorseData));
            
            const { data, error } = await db.from('horses').upsert([currentHorseData], { onConflict: 'id' });
            
            if (error) {
                console.error(error);
                alert("error saving to the cloud! check console.");
                return;
            }

            closeNameModal();
            loadPasture();
        }

        function editHorse() {
            pastureUI.style.display = "none";
            pastureArea.style.display = "none";
            pastureArea.innerHTML = ""; 
            creatorView.style.display = "block";
            closeListModal();
            closeViewModal();
        }

        async function loadPasture() {
            creatorView.style.display = "none";
            pastureUI.style.display = "block";
            pastureArea.style.display = "block";
            pastureArea.innerHTML = ""; 

            const { data: allHorses, error } = await db.from('horses').select('*');

            if (error) {
                console.error(error);
                return;
            }

            if (allHorses) {
                // sort horses by global cloud likes
                allHorses.sort((a, b) => (b.likes || 0) - (a.likes || 0));
                loadedHorses = allHorses; 
                
                // load every single horse!
                loadedHorses.forEach(function(horse, index) {
                    renderHorseToPasture(horse, index + 1); 
                });

                // build the leaderboard list
                renderListModal();
            }
        }

        function renderHorseToPasture(horse, rank) {
            var dynamicSVG = `
                <svg width="0" height="0" style="position:absolute;">
                    <filter id="tint-fur-${horse.id}"><feFlood flood-color="${horse.fur}" result="color"/><feComposite in="color" in2="SourceAlpha" operator="in"/></filter>
                    <filter id="tint-hair-${horse.id}"><feFlood flood-color="${horse.hair}" result="color"/><feComposite in="color" in2="SourceAlpha" operator="in"/></filter>
                    <filter id="tint-nose-${horse.id}"><feFlood flood-color="${horse.nose}" result="color"/><feComposite in="color" in2="SourceAlpha" operator="in"/></filter>
                </svg>
            `;

            var startPosition = Math.floor(Math.random() * 80); 
            var startFacing = Math.random() < 0.5 ? 1 : -1;

            var crownHTML = rank === 1 ? `<img src="/img/horserace/horse/horse_crown.png" class="layer" style="z-index: 5;">` : '';

            // sprite div no longer has onclick. onclick is ONLY on the name tag!
            var horseHTML = `
                <div class="horse-sprite" id="sprite-${horse.id}" style="transform: translateX(${startPosition}vw);" data-x="${startPosition}">
                    <div class="horse-name" onclick="openViewModal('${horse.id}', ${rank})">${horse.name}</div>
                    <div class="horse-images" style="transform: scaleX(${startFacing});">
                        <img src="/img/horserace/horse/horse_basecolor.png" class="layer" style="filter: url(#tint-fur-${horse.id});">
                        <img src="/img/horserace/horse/horse_eyewhite.png" class="layer">
                        <img src="/img/horserace/horse/horse_baseoutline.png" class="layer">
                        <img src="/img/horserace/horse/horse_earcolor.png" class="layer" style="filter: url(#tint-fur-${horse.id});">
                        <img src="/img/horserace/horse/horse_earoutline.png" class="layer">
                        <img src="/img/horserace/horse/horse_haircolor.png" class="layer" style="filter: url(#tint-hair-${horse.id});">
                        <img src="/img/horserace/horse/horse_hairoutline.png" class="layer">
                        <img src="/img/horserace/horse/horse_nosecolor.png" class="layer" style="filter: url(#tint-nose-${horse.id});">
                        ${crownHTML}
                    </div>
                </div>
            `;

            pastureArea.insertAdjacentHTML('beforeend', dynamicSVG + horseHTML);
            
            setTimeout(function() {
                var newSprite = document.getElementById('sprite-' + horse.id);
                if (newSprite) {
                    startHorseBrain(newSprite);
                }
            }, 100);
        }

        // --- LEADERBOARD LIST LOGIC ---
        function renderListModal() {
            // ensure they are perfectly sorted by likes before building the list
            loadedHorses.sort((a, b) => (b.likes || 0) - (a.likes || 0));
            
            var listContainer = document.getElementById('horse-list-container');
            var listHTML = '';
            
            loadedHorses.forEach(function(horse, index) {
                var rank = index + 1;
                var rankStr = rank === 1 ? '👑 1' : '#' + rank;
                
                listHTML += `
                    <div class="list-item" onclick="openViewModal('${horse.id}', ${rank})">
                        <span class="list-rank">${rankStr}</span>
                        <span class="list-name">${horse.name}</span>
                        <span class="list-likes">👍 ${horse.likes || 0}</span>
                    </div>
                `;
            });
            listContainer.innerHTML = listHTML;
        }

        function openListModal() {
            closeViewModal(); // close profile if it's open
            listModal.style.display = "block";
            pastureArea.style.opacity = "0.3"; 
            pastureArea.style.pointerEvents = "none"; 
        }

        function closeListModal() {
            listModal.style.display = "none";
            // only restore pasture if the view modal isn't also open
            if (viewModal.style.display !== "block") {
                pastureArea.style.opacity = "1";
                pastureArea.style.pointerEvents = "auto";
            }
        }

        // --- VIEW PROFILE LOGIC ---
        function openViewModal(horseId, rank) {
            closeListModal(); // hide list if it was open

            horseBeingViewed = loadedHorses.find(h => h.id === horseId);
            if (!horseBeingViewed) return;

            document.getElementById('view-title').innerText = horseBeingViewed.name;
            
            document.querySelector('#tint-fur-view feFlood').setAttribute('flood-color', horseBeingViewed.fur);
            document.querySelector('#tint-hair-view feFlood').setAttribute('flood-color', horseBeingViewed.hair);
            document.querySelector('#tint-nose-view feFlood').setAttribute('flood-color', horseBeingViewed.nose);

            var rankBadge = document.getElementById('view-rank');
            rankBadge.innerText = "#" + rank;
            if (rank === 1) {
                rankBadge.classList.add('gold');
                document.getElementById('view-crown').style.display = "block";
            } else {
                rankBadge.classList.remove('gold');
                document.getElementById('view-crown').style.display = "none";
            }

            var likeBtn = document.getElementById('view-like-btn');
            var currentLikes = horseBeingViewed.likes || 0;
            
            var likedStorage = JSON.parse(localStorage.getItem('likedHorses') || '[]');
            
            likeBtn.innerText = "👍 " + currentLikes;
            
            if (likedStorage.includes(horseId)) {
                likeBtn.style.opacity = "0.6";
            } else {
                likeBtn.style.opacity = "1";
            }

            viewModal.style.display = "block";
            pastureArea.style.opacity = "0.3"; 
            pastureArea.style.pointerEvents = "none"; 
        }

        function closeViewModal() {
            viewModal.style.display = "none";
            pastureArea.style.opacity = "1";
            pastureArea.style.pointerEvents = "auto";
            horseBeingViewed = null;
        }

        async function toggleLike() {
            if (!horseBeingViewed) return;

            var likedStorage = JSON.parse(localStorage.getItem('likedHorses') || '[]');
            var isAlreadyLiked = likedStorage.includes(horseBeingViewed.id);
            var currentLikes = horseBeingViewed.likes || 0;
            var newLikes;
            var likeBtn = document.getElementById('view-like-btn');

            if (isAlreadyLiked) {
                newLikes = Math.max(0, currentLikes - 1);
                likedStorage = likedStorage.filter(id => id !== horseBeingViewed.id);
                likeBtn.style.opacity = "1";
            } else {
                newLikes = currentLikes + 1;
                likedStorage.push(horseBeingViewed.id);
                likeBtn.style.opacity = "0.6";
            }

            horseBeingViewed.likes = newLikes; 
            localStorage.setItem('likedHorses', JSON.stringify(likedStorage));
            likeBtn.innerText = "👍 " + newLikes;

            // update the list in the background so the numbers match!
            renderListModal(); 

            await db.from('horses').update({ likes: newLikes }).eq('id', horseBeingViewed.id);
        }

        function startHorseBrain(sprite) {
            function decideNextMove() {
                if (!document.body.contains(sprite) || pastureArea.style.display !== "block") {
                    setTimeout(decideNextMove, 1000);
                    return;
                }

                if (Math.random() < 0.6) {
                    var napTime = Math.random() * 5000 + 3000; 
                    setTimeout(decideNextMove, napTime);
                    return;
                }

                var currentLeft = parseFloat(sprite.getAttribute('data-x')) || 50;
                
                var distance = (Math.random() * 15 + 10);
                var direction = Math.random() < 0.5 ? 1 : -1;
                var newLeft = currentLeft + (distance * direction);
                
                if (newLeft < 5) newLeft = 5 + Math.random() * 5;
                if (newLeft > 80) newLeft = 80 - Math.random() * 5;

                var horseImages = sprite.querySelector('.horse-images');
                if (newLeft > currentLeft) {
                    horseImages.style.transform = "scaleX(1)";
                } else {
                    horseImages.style.transform = "scaleX(-1)";
                }

                var walkTime = Math.abs(newLeft - currentLeft) * 0.3; 
                
                sprite.setAttribute('data-x', newLeft);
                sprite.style.transition = "transform " + walkTime + "s linear";
                sprite.style.transform = "translateX(" + newLeft + "vw)";

                setTimeout(decideNextMove, (walkTime * 1000) + 2000);
            }

            setTimeout(decideNextMove, Math.random() * 4000);
        }

    </script>
