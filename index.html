<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ren's headspace</title>
    
    <link rel="stylesheet" href="https://cdn.cursors-4u.net/cursors/animated/shiny-grey-star-4a7c7422-32.css">
    
    <style>
        /* --- Deep Slate Blue Space Reset --- */
        body {
            background-color: #0b0b14;
            background-image: radial-gradient(circle at center, #1e1d30 0%, #0b0b14 100%);
            color: #d0d0e6;
            font-family: Verdana, Tahoma, sans-serif;
            font-size: 11px;
            margin: 0;
            padding: 0; 
            overflow-x: hidden;
        }

        a { color: #8e8cf0; text-decoration: none; font-weight: bold; }
        a:hover { color: #fff; background-color: #8e8cf0; text-decoration: none; cursor: help; }

        /* --- Blinking Background Stars --- */
        #star-field {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .bg-star {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            animation: twinkle infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.1; transform: scale(0.5); }
            100% { opacity: 0.8; transform: scale(1.2); box-shadow: 0 0 4px #fff; }
        }

        /* --- Classic MySpace-Style Layout Container --- */
        .wrapper {
            width: 750px;
            margin: 0 auto;
            min-height: 100vh; 
            background-color: rgba(15, 15, 25, 0.8);
            border-left: 1px dotted #5c5a8a;
            border-right: 1px dotted #5c5a8a;
            padding: 30px 20px; 
            box-sizing: border-box;
            z-index: 10;
            position: relative;
        }

        /* --- Header --- */
        .header {
            text-align: center;
            border-bottom: 1px dashed #48476e;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .header h1 {
            font-size: 24px;
            color: #c4c3f5;
            letter-spacing: 3px;
            text-shadow: 0 0 8px #5c5a8a;
            margin: 5px 0;
            font-weight: normal;
        }

        /* --- Navigation --- */
        .nav-bar {
            text-align: center;
            margin-bottom: 30px;
            word-spacing: 15px;
        }
        .nav-bar a { font-size: 12px; }

        /* --- 2-Column Layout --- */
        .columns {
            display: flex;
            gap: 20px;
        }

        /* Left Column (Sidebar) */
        .left-col {
            width: 220px;
        }

        .box {
            background-color: rgba(51, 50, 82, 0.6); 
            border: 1px solid #48476e;
            padding: 10px;
            margin-bottom: 20px;
        }

        .box-title {
            background-color: #5c5a8a;
            color: #0b0b14;
            font-weight: bold;
            padding: 2px 5px;
            margin: -10px -10px 10px -10px;
            font-size: 10px;
            text-transform: uppercase;
        }

        .profile-img {
            width: 100%;
            height: 180px;
            border: 1px dotted #5c5a8a;
            background-image: url('img/Pic.png');
            background-size: cover;
            background-position: center;
            margin-bottom: 10px;
        }

        /* Right Column (Blog Feed) */
        .right-col {
            width: 480px; 
        }

        .blog-entry {
            margin-bottom: 25px;
        }
        
        .blog-header {
            border-bottom: 1px dotted #48476e;
            padding-bottom: 3px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        
        .blog-title {
            font-weight: bold;
            font-size: 14px;
            color: #c4c3f5;
        }
        
        .blog-date {
            color: #8382ad;
        }

        .blog-content {
            line-height: 1.6;
            text-align: justify;
        }

        /* --- Star Mouse Trail --- */
        .trail-particle {
            position: absolute;
            width: 12px; 
            height: 12px;
            pointer-events: none; 
            z-index: 9999;
            transform: translate(-50%, -50%) scale(1);
            transition: transform 0.6s linear, opacity 0.6s linear;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            filter: drop-shadow(0 0 3px #c4c3f5);
        }
    </style>
</head>
<body>

    <div id="star-field"></div>

    <div class="wrapper">
        
        <div class="header">
            <h1>✧ ren's headspace ✧</h1>
        </div>

        <div class="nav-bar">
            [ <a href="index.html">home</a> ] 
            [ <a href="creations.html">creations</a> ] 
            [ <a href="projects.html">projects</a> ] 
            [ <a href="#">downloads</a> ]
        </div>

        <div class="columns">
            
            <div class="left-col">
                <div class="box">
                    <div class="box-title">About Me</div>
                    <div class="profile-img"></div>
                    <p><b>ren</b> (cosmicstellars)</p>
                    <p><b>he/him</b></p>
                </div>
            </div>

            <div class="right-col">
                
                <div class="box">
                    <div class="box-title">journal</div>
                    
                    <div id="blog-feed">
                        <p style="text-align: center; color: #8382ad;">loading</p>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script>
        // --- Generate Blinking Space Background ---
        const starField = document.getElementById('star-field');
        const starCount = 100;

        for (let i = 0; i < starCount; i++) {
            let star = document.createElement('div');
            star.className = 'bg-star';
            
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            
            let size = (Math.random() * 2 + 1) + 'px';
            star.style.width = size;
            star.style.height = size;
            
            star.style.animationDuration = (Math.random() * 3 + 1.5) + 's';
            star.style.animationDelay = (Math.random() * 5) + 's';
            
            starField.appendChild(star);
        }

        // --- Dreamy Star Mouse Trail ---
        const colors = ['#ffffff', '#cccccc', '#8e8cf0', '#c4c3f5'];
        let activeParticles = 0;
        let lastSpawn = 0;

        document.addEventListener('mousemove', function(e) {
            const now = Date.now();
            if (now - lastSpawn < 30) return;
            if (activeParticles > 30) return;
            lastSpawn = now;

            const particle = document.createElement('div');
            particle.className = 'trail-particle';
            
            particle.style.left = e.pageX + 'px';
            particle.style.top = e.pageY + 'px';
            particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            document.body.appendChild(particle);
            activeParticles++;

            setTimeout(() => {
                particle.style.transform = 'translate(-50%, -50%) scale(0) translateY(20px) rotate(45deg)';
                particle.style.opacity = '0';
            }, 10);

            setTimeout(() => {
                particle.remove();
                activeParticles--;
            }, 600);
        });
    </script>

    <script src="posts.js"></script>

    <script>
        // Clear the "loading transmissions..." text
        const feedContainer = document.getElementById('blog-feed');
        feedContainer.innerHTML = '';
        
        // Loop through the blogPosts variable from your posts.js file
        if (typeof blogPosts !== 'undefined') {
            blogPosts.forEach(post => {
                const postHTML = `
                    <div class="blog-entry">
                        <div class="blog-header">
                            <span class="blog-title">${post.title}</span>
                            <span class="blog-date">${post.date}</span>
                        </div>
                        <div class="blog-content">
                            ${post.content}
                        </div>
                    </div>
                `;
                // Inject the built HTML into the container
                feedContainer.innerHTML += postHTML;
            });
        } else {
            feedContainer.innerHTML = '<p style="text-align: center; color: #ff9999;">Error: posts.js not found or formatted incorrectly.</p>';
        }
    </script>

</body>
</html>
