<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ren's headspace - character profile</title>
    
    <link rel="stylesheet" href="https://cdn.cursors-4u.net/cursors/animated/shiny-grey-star-4a7c7422-32.css">
    <link rel="stylesheet" href="/style.css?v=3">
    <link rel="icon" type="image/png" href="/img/Icon.png">

    <style>
        /* --- THEME-MATCHED STATS --- */
        .char-stat {
            margin: 5px 0;
            font-size: 11px;
            color: #d0d0e6;
            border-bottom: 1px dotted #48476e;
            padding-bottom: 5px;
        }

        .char-stat b {
            color: #c4c3f5;
            font-weight: bold;
            display: inline-block;
            width: 80px;
        }

        .character-name-header {
            text-align: center; 
            color: #8e8cf0; 
            font-family: 'Orbitron', sans-serif; 
            font-size: 20px;
            letter-spacing: 2px; 
            margin: 5px 0 15px 0;
            text-shadow: 0 0 5px #5c5a8a;
        }

        /* --- RELATIONSHIP SUBCATEGORIES & MINI POLAROIDS --- */
        .rel-category {
            font-size: 10px;
            color: #8382ad; 
            text-transform: lowercase;
            letter-spacing: 1px;
            margin: 10px 0 8px 0;
            font-weight: bold;
            border-bottom: 1px dashed #48476e;
            padding-bottom: 2px;
            display: inline-block;
        }

        .mini-roster {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .mini-polaroid {
            background-color: rgba(51, 50, 82, 0.6);
            padding: 5px 5px 8px 5px; 
            border: 1px solid #48476e;
            width: 70px; /* tiny! */
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            text-decoration: none;
            transition: all 0.1s ease;
        }

        .mini-polaroid:hover {
            border-color: #8e8cf0;
            background-color: rgba(92, 90, 138, 0.6);
            transform: translateY(-2px);
        }

        .mini-polaroid img {
            width: 100%;
            height: 70px;
            object-fit: cover;
            border: 1px dotted #5c5a8a;
            margin-bottom: 5px;
            background-color: #1e1d30;
        }

        .mini-polaroid span {
            font-size: 9px;
            font-weight: bold;
            color: #c4c3f5;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .mini-polaroid.wip {
            cursor: default; 
        }

        .mini-polaroid.wip:hover {
            transform: none; 
            border-color: #48476e; 
            background-color: rgba(51, 50, 82, 0.6); 
        }

        /* missing character placeholder */
        .mini-polaroid .placeholder-img {
            width: 100%;
            height: 70px;
            border: 1px dotted #5c5a8a;
            margin-bottom: 5px;
            background-color: #0b0b14;
            color: #48476e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }


        /* --- FULL-WIDTH HORIZONTAL SCROLLING GALLERY --- */
        .horizontal-gallery {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            justify-content: center; 
            gap: 15px;
            padding-bottom: 15px; 
            scrollbar-width: thin;
            scrollbar-color: #8e8cf0 rgba(51, 50, 82, 0.6);
        }

        .horizontal-gallery::-webkit-scrollbar { height: 8px; }
        .horizontal-gallery::-webkit-scrollbar-track { background: rgba(51, 50, 82, 0.6); border-radius: 4px; border: 1px solid #48476e; }
        .horizontal-gallery::-webkit-scrollbar-thumb { background-color: #8e8cf0; border-radius: 4px; }
        .horizontal-gallery::-webkit-scrollbar-thumb:hover { background-color: #c4c3f5; }

        .horizontal-gallery .gallery-item {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: transparent; 
            border: none; 
            padding: 0;
        }
        
        /* FIXED: These !important tags stop style.css from making them squares! */
        .horizontal-gallery .gallery-thumb {
            height: 160px !important; 
            width: auto !important; 
            max-width: 400px; 
            aspect-ratio: auto !important; /* <--- THIS FIXES THE CROPPING! */
            object-fit: contain !important; 
            border: 1px dotted #5c5a8a !important;
            cursor: pointer;
            padding: 2px; 
            margin-bottom: 0 !important; 
        }

        .horizontal-gallery .gallery-item:hover .gallery-thumb {
            border: 1px solid #8e8cf0 !important;
        }

        .horizontal-gallery .gallery-item:hover {
            background-color: transparent; 
            border-color: transparent;
        }

        .gallery-caption {
            font-size: 10px;
            color: #8382ad;
            text-align: center;
            line-height: 1.3;
            max-width: 100%;
            margin-top: 8px; 
        }

        /* --- NEW: LIGHTBOX ARROWS --- */
        .lb-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(30, 29, 48, 0.9);
            color: #8e8cf0;
            border: 1px solid #48476e;
            font-size: 24px;
            padding: 15px 20px;
            cursor: pointer;
            z-index: 100002;
            transition: all 0.2s;
        }
        .lb-nav:hover {
            background: #8e8cf0;
            color: #0b0b14;
        }
        #lightbox-prev { left: 5%; }
        #lightbox-next { right: 5%; }

        /* --- LIGHTBOX OVERRIDES --- */
        #lightbox-content-box {
            width: fit-content !important; /* forces the box to hug the image exactly */
            max-width: 95vw;
            background: transparent !important; /* removes the bulky background box entirely */
            border: none !important;
            padding: 0 !important;
            margin: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #lightbox-img {
            max-width: 90vw;
            max-height: 85vh; /* keeps tall images from going off-screen */
            width: auto !important; 
            height: auto !important;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); /* optional: gives the image a nice floating shadow since the box is gone */
            border: 1px solid #48476e; /* optional: adds a subtle border to the image itself */
        }

        /* gives the text a tiny background so it's still readable over the dark overlay */
        #lightbox-title, #lightbox-desc {
            background: rgba(30, 29, 48, 0.9); 
            border: 1px dotted #48476e;
            padding: 5px 10px;
            margin-top: 8px;
            text-align: center;
            max-width: 100%;
        }
    </style>
</head>
<body>

    <div id="lightbox" onclick="closeLightbox(event)">
        <button id="lightbox-close" onclick="closeLightbox(event)" title="Close">✖</button>
        <button id="lightbox-prev" class="lb-nav" onclick="changeLightbox(-1, event)">&#10094;</button>
        <button id="lightbox-next" class="lb-nav" onclick="changeLightbox(1, event)">&#10095;</button>
        
        <div id="lightbox-content-box" onclick="event.stopPropagation()">
            <img id="lightbox-img" src="" alt="Creation Image">
            <div id="lightbox-title"></div>
            <div id="lightbox-desc"></div>
        </div>
    </div>

    <div id="star-field"></div>

    <div class="wrapper">
        <div class="header">
            <h1>ren's headspace</h1>
        </div>

        <div class="nav-bar">
            [<a href="/" style="margin: 0 4px;">home</a>] 
            [<a href="/creations" style="margin: 0 4px; color: #8e8cf0; font-weight: bold;">creations & ocs</a>] 
            [<a href="/projects" style="margin: 0 4px;">games & projects</a>] 
            [<a href="#" style="margin: 0 4px;">downloads</a>]
        </div>

        <div id="profile-content" style="display: none;">
            
            <div class="columns">
                <div class="left-col">
                    <div class="box">
                        <div class="box-title">profile</div>
                        
                        <div class="character-name-header" id="char-name">name</div>
                        
                        <div style="text-align: center; margin-bottom: 15px;">
                            <img id="char-img" src="" style="width: 100%; max-width: 200px; border: 1px solid #48476e; background-color: #1e1d30; object-fit: cover;">
                        </div>
                        
                        <div class="char-stat"><b>age:</b> <span id="char-age">?</span></div>
                        <div class="char-stat"><b>gender:</b> <span id="char-gender">?</span></div>
                        <div class="char-stat"><b>pronouns:</b> <span id="char-pronouns">?</span></div>
                        <div class="char-stat"><b>sexuality:</b> <span id="char-sexuality">?</span></div>
                        <div class="char-stat" id="species-container" style="display: none;"><b>species:</b> <span id="char-species">?</span></div>
                    </div>
                </div>

                <div class="right-col">
                    <div class="box">
                        <div class="box-title">character lore</div>
                        <div id="blog-feed">
                            
                            <div class="blog-entry">
                                <div class="blog-header">
                                    <span class="blog-title">description</span>
                                </div>
                                <div class="blog-content" id="char-desc"></div>
                            </div>

                            <div class="blog-entry">
                                <div class="blog-header">
                                    <span class="blog-title">backstory</span>
                                </div>
                                <div class="blog-content" id="char-backstory"></div>
                            </div>

                            <div class="blog-entry" style="margin-bottom: 10px;">
                                <div class="blog-header">
                                    <span class="blog-title">relationships</span>
                                </div>
                                <div class="blog-content" id="char-relationships"></div>
                            </div>

                        </div>
                    </div>
                </div>
            </div> 
            
            <div class="box" id="char-gallery-box" style="display: none; width: 100%; box-sizing: border-box;">
                <div class="box-title">gallery</div>
                <div class="horizontal-gallery" id="char-gallery-feed">
                    </div>
            </div>

        </div>

        <div id="error-msg" style="text-align: center; margin-top: 50px; color: #8e8cf0; font-weight: bold; display: none;">
            error: character not found in database!
        </div>
    </div>

    <script>
        var starField = document.getElementById('star-field');
        if (starField) {
            for (var i = 0; i < 100; i++) {
                var star = document.createElement('div');
                star.className = 'bg-star';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                var size = (Math.random() * 2 + 1) + 'px';
                star.style.width = size; star.style.height = size;
                star.style.animationDuration = (Math.random() * 3 + 1.5) + 's';
                star.style.animationDelay = (Math.random() * 5) + 's';
                starField.appendChild(star);
            }
        }
    </script>

    <script src="/ocs.js?v=8"></script>

    <script>
        // --- NEW: GALLERY LIGHTBOX LOGIC ---
        var currentGalleryItems = [];
        var currentGalleryIndex = 0;

        window.openLightbox = function(index) {
            currentGalleryIndex = index;
            updateLightbox();
            document.getElementById('lightbox').style.display = 'flex';
        };

        window.updateLightbox = function() {
            if (!currentGalleryItems || currentGalleryItems.length === 0) return;
            var item = currentGalleryItems[currentGalleryIndex];
            
            document.getElementById('lightbox-img').src = item.image;
            document.getElementById('lightbox-title').innerText = item.title || "";
            document.getElementById('lightbox-desc').innerText = item.description || "";
            
            // Hides the text containers entirely if there's no description/title
            document.getElementById('lightbox-title').style.display = item.title ? "block" : "none";
            document.getElementById('lightbox-desc').style.display = item.description ? "block" : "none";

            // Hides arrows if we are at the very beginning or end of the gallery
            document.getElementById('lightbox-prev').style.display = currentGalleryIndex > 0 ? "block" : "none";
            document.getElementById('lightbox-next').style.display = currentGalleryIndex < currentGalleryItems.length - 1 ? "block" : "none";
        };

        window.changeLightbox = function(dir, event) {
            if (event) event.stopPropagation(); // Stops the background click from closing it
            currentGalleryIndex += dir;
            updateLightbox();
        };

        window.closeLightbox = function(event) {
            // Only closes if you click the X or the black background!
            if (event.target === document.getElementById('lightbox') || event.target.id === 'lightbox-close') {
                document.getElementById('lightbox').style.display = 'none';
            }
        };

        function escapeHTML(str) {
            if (!str) return "";
            return str.replace(/[&<>"']/g, function(match) {
                switch (match) {
                    case '&': return '&amp;';
                    case '<': return '&lt;';
                    case '>': return '&gt;';
                    case '"': return '&quot;';
                    case "'": return '&#039;';
                    default: return match;
                }
            });
        }

        var urlParams = new URLSearchParams(window.location.search);
        var charQuery = urlParams.get('char');

        var allOCs = [];
        if (typeof ocsHumanData !== 'undefined') allOCs = allOCs.concat(ocsHumanData);
        if (typeof ocsFantasyData !== 'undefined') allOCs = allOCs.concat(ocsFantasyData);

        var foundChar = null;
        if (charQuery) {
            foundChar = allOCs.find(function(c) {
                // Forces everything to lowercase to catch mismatched typing!
                var idToCheck = c.id ? c.id.toLowerCase() : c.title.toLowerCase().replace(/\s+/g, '-');
                return idToCheck === charQuery.toLowerCase();
            });
        }

        if (foundChar) {
            document.getElementById('profile-content').style.display = 'block'; 
            
            document.title = "ren's headspace - " + foundChar.title;
            document.getElementById('char-name').innerText = foundChar.title;
            document.getElementById('char-img').src = foundChar.image;
            
            document.getElementById('char-age').innerText = foundChar.age || "unknown";
            document.getElementById('char-gender').innerText = foundChar.gender || "unknown";
            document.getElementById('char-pronouns').innerText = foundChar.pronouns || "any";
            document.getElementById('char-sexuality').innerText = foundChar.sexuality || "unknown";
            
            if (foundChar.species) {
                document.getElementById('char-species').innerText = foundChar.species;
                document.getElementById('species-container').style.display = 'block';
            }

            document.getElementById('char-desc').innerHTML = foundChar.description || "no description provided.";
            document.getElementById('char-backstory').innerHTML = foundChar.backstory || "a mystery waiting to be uncovered...";
            
            var relContainer = document.getElementById('char-relationships');
            if (foundChar.relationships && Array.isArray(foundChar.relationships)) {
                var relHTML = '';
                
                foundChar.relationships.forEach(function(rel) {
                    var safeCat = escapeHTML(rel.category);
                    relHTML += `<div class="rel-category">${safeCat}</div>`;
                    relHTML += `<div class="mini-roster">`;
                    
                    if (rel.chars && Array.isArray(rel.chars)) {
                        rel.chars.forEach(function(relId) {
                            var relatedChar = allOCs.find(function(c) {
                                // Forces the relationship ID to lowercase to match Mizuki correctly!
                                var idToCheck = c.id ? c.id.toLowerCase() : c.title.toLowerCase().replace(/\s+/g, '-');
                                return idToCheck === relId.toLowerCase();
                            });

                            if (relatedChar) {
                                var safeTitle = escapeHTML(relatedChar.title);
                                var safeImg = escapeHTML(relatedChar.image);
                                
                                if (relatedChar.wip) {
                                    relHTML += `
                                        <div class="mini-polaroid wip" title="wip!">
                                            <img src="${safeImg}" alt="${safeTitle}">
                                            <span>${safeTitle}</span>
                                        </div>
                                    `;
                                } else {
                                    relHTML += `
                                        <a href="/creations/character?char=${encodeURIComponent(relId.toLowerCase())}" class="mini-polaroid">
                                            <img src="${safeImg}" alt="${safeTitle}">
                                            <span>${safeTitle}</span>
                                        </a>
                                    `;
                                }
                            } else {
                                relHTML += `
                                    <div class="mini-polaroid wip" style="cursor: default;">
                                        <div class="placeholder-img">?</div>
                                        <span>${escapeHTML(relId)}</span>
                                    </div>
                                `;
                            }
                        });
                    }
                    relHTML += `</div>`;
                });
                
                relContainer.innerHTML = relHTML;
            } else {
                relContainer.innerHTML = "loner.";
            }

            // --- NEW: GALLERY RENDERER WITH LIGHTBOX ARRAYS ---
            if (foundChar.gallery && foundChar.gallery.length > 0) {
                document.getElementById('char-gallery-box').style.display = "block";

                // Stores the gallery data so the arrows know what to show next
                currentGalleryItems = foundChar.gallery.map(function(item) {
                    return {
                        title: item.title || "",
                        image: escapeHTML(item.image),
                        description: item.description ? escapeHTML(item.description) : ""
                    };
                });

                var galHTML = '';
                currentGalleryItems.forEach(function(item, index) {
                    var captionHTML = item.description ? `<div class="gallery-caption">${item.description}</div>` : "";

                    // We now pass the INDEX number to the lightbox instead of text!
                    galHTML += `
                        <div class="gallery-item" onclick="window.openLightbox(${index})">
                            <img src="${item.image}" class="gallery-thumb" alt="gallery image">
                            ${captionHTML}
                        </div>
                    `;
                });
                document.getElementById('char-gallery-feed').innerHTML = galHTML;
            }

        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    </script>
</body>
</html>
