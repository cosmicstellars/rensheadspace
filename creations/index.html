<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ren's headspace - art & ocs</title>
    
    <link rel="stylesheet" href="https://cdn.cursors-4u.net/cursors/animated/shiny-grey-star-4a7c7422-32.css">
    <link rel="stylesheet" href="/style.css?v=3">
    <link rel="icon" type="image/png" href="/img/Icon.png">

    <style>
        .section-title {
            text-align: center;
            font-size: 20px;
            font-weight: 900;
            color: #8e8cf0;
            margin: 30px 0 15px 0;
            letter-spacing: 1px;
            text-transform: lowercase;
        }

        /* --- TUMBLR/MYSPACE STYLE TABS --- */
        .tab-container {
            text-align: center;
            margin: 15px 0 25px 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #8382ad;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            padding: 5px 10px;
            transition: color 0.1s;
        }

        .tab-btn:hover {
            color: #8e8cf0;
        }

        /* changed to a soft light lavender! */
        .tab-btn.active {
            color: #b3b1f5;
            border-bottom: 2px dotted #b3b1f5;
        }

        /* hide sections by default */
        .page-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        /* show active section */
        .page-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- OC STYLES --- */
        .universe-title {
            text-align: center;
            font-size: 16px;
            font-weight: 800;
            color: #ff6b81;
            margin: 20px 0 10px 0;
            border-bottom: 2px dashed #ffb8b8;
            display: inline-block;
            padding-bottom: 5px;
        }

        .universe-container {
            text-align: center;
        }

        .oc-viewer {
            display: none;
            background: #ffffff;
            border: 3px solid #8e8cf0;
            border-radius: 12px;
            padding: 20px;
            margin: 20px auto;
            max-width: 600px;
            box-shadow: 0 8px 20px rgba(142, 140, 240, 0.2);
            text-align: left;
            animation: popIn 0.2s ease-out;
        }

        @keyframes popIn {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .oc-viewer-inner {
            display: flex;
            gap: 20px;
        }

        .oc-viewer-portrait {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #d1d8dc;
            background-color: #f7f9fa;
        }

        .oc-viewer-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .oc-viewer-name {
            margin: 0 0 10px 0;
            font-size: 24px;
            color: #4a4a4a;
            font-weight: 900;
        }

        .oc-viewer-desc {
            margin: 0;
            font-size: 15px;
            color: #555;
            line-height: 1.6;
            font-weight: 700;
        }

        .oc-roster {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .oc-icon {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 3px solid #d1d8dc;
            object-fit: cover;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.1s;
            background: #fff;
        }

        .oc-icon:hover {
            transform: translateY(-5px) scale(1.1);
            border-color: #8e8cf0;
            box-shadow: 0 5px 10px rgba(142, 140, 240, 0.3);
        }

        .oc-icon.active {
            border-color: #ff6b81;
            box-shadow: 0 0 0 4px #ffb8b8;
        }
    </style>
</head>
<body>

    <div id="lightbox" onclick="closeLightbox(event)">
        <button id="lightbox-close" onclick="closeLightbox(event)" title="Close">✖</button>
        <div id="lightbox-content-box">
            <img id="lightbox-img" src="" alt="Creation Image">
            <div id="lightbox-title"></div>
            <div id="lightbox-desc"></div>
        </div>
    </div>

    <div id="star-field"></div>

    <div class="wrapper">
        <div class="header">
            <h1>ren's headspace</h1>
        </div>

        <div class="nav-bar">
            [<a href="/" style="margin: 0 4px;">home</a>] 
            [<a href="/creations" style="margin: 0 4px;">art & ocs</a>] 
            [<a href="/projects" style="margin: 0 4px;">games & dev</a>] 
            [<a href="#" style="margin: 0 4px;">downloads</a>]
        </div>

        <div class="search-container">
            <span class="search-prompt">&gt;</span>
            <input type="text" id="search-bar" placeholder="query database..." onkeyup="filterGallery()">
        </div>

        <div class="tab-container">
            <button class="tab-btn active" id="btn-art" onclick="switchTab('art')">gallery</button>
            <button class="tab-btn" id="btn-ocs" onclick="switchTab('ocs')">ocs</button>
        </div>

        <div id="section-art" class="page-section active">
            <div class="gallery-container" id="art-feed">
                <p style="text-align: center; color: #8382ad;">loading art...</p>
            </div>
        </div>

        <div id="section-ocs" class="page-section">
            <div class="oc-viewer" id="main-oc-viewer">
                <div class="oc-viewer-inner">
                    <img src="" id="viewer-img" class="oc-viewer-portrait">
                    <div class="oc-viewer-info">
                        <h2 class="oc-viewer-name" id="viewer-name">Name</h2>
                        <p class="oc-viewer-desc" id="viewer-desc">Lore goes here...</p>
                    </div>
                </div>
            </div>

            <div class="universe-container">
                <div class="universe-title">human universe</div>
                <div class="oc-roster" id="roster-human">
                    <p style="color: #8382ad; font-size: 13px;">loading roster...</p>
                </div>

                <div class="universe-title" style="margin-top: 10px;">fantasy universe</div>
                <div class="oc-roster" id="roster-fantasy">
                    <p style="color: #8382ad; font-size: 13px;">loading roster...</p>
                </div>
            </div>
        </div>
        
        <br><br>
    </div>

    <script>
        var starField = document.getElementById('star-field');
        if (starField) {
            for (var i = 0; i < 100; i++) {
                var star = document.createElement('div');
                star.className = 'bg-star';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                var size = (Math.random() * 2 + 1) + 'px';
                star.style.width = size; star.style.height = size;
                star.style.animationDuration = (Math.random() * 3 + 1.5) + 's';
                star.style.animationDelay = (Math.random() * 5) + 's';
                starField.appendChild(star);
            }
        }

        var colors = ['#ffffff', '#cccccc', '#8e8cf0', '#c4c3f5'];
        var activeParticles = 0;
        var lastSpawn = 0;

        document.addEventListener('mousemove', function(e) {
            var now = Date.now();
            if (now - lastSpawn < 30 || activeParticles > 30) return;
            lastSpawn = now;
            var particle = document.createElement('div');
            particle.className = 'trail-particle';
            particle.style.left = e.pageX + 'px'; particle.style.top = e.pageY + 'px';
            particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            document.body.appendChild(particle);
            activeParticles++;
            setTimeout(function() { particle.style.transform = 'translate(-50%, -50%) scale(0) translateY(20px) rotate(45deg)'; particle.style.opacity = '0'; }, 10);
            setTimeout(function() { particle.remove(); activeParticles--; }, 600);
        });
    </script>

    <script src="/creations.js?v=5"></script>

    <script>
        // --- TAB SWITCHER LOGIC ---
        function switchTab(tabId) {
            document.getElementById('btn-art').classList.remove('active');
            document.getElementById('btn-ocs').classList.remove('active');
            document.getElementById('btn-' + tabId).classList.add('active');

            document.getElementById('section-art').classList.remove('active');
            document.getElementById('section-ocs').classList.remove('active');
            document.getElementById('section-' + tabId).classList.add('active');

            document.getElementById('search-bar').value = '';
            filterGallery();
        }

        // XSS Sanitizer
        function escapeHTML(str) {
            if (!str) return "";
            return str.replace(/[&<>"']/g, function(match) {
                switch (match) {
                    case '&': return '&amp;';
                    case '<': return '&lt;';
                    case '>': return '&gt;';
                    case '"': return '&quot;';
                    case "'": return '&#039;';
                    default: return match;
                }
            });
        }

        // --- ART LOGIC ---
        var lightbox = document.getElementById('lightbox');
        var lbImg = document.getElementById('lightbox-img');
        var lbTitle = document.getElementById('lightbox-title');
        var lbDesc = document.getElementById('lightbox-desc');

        window.openLightbox = function(title, imgUrl, desc) {
            lbImg.src = imgUrl;
            lbTitle.innerText = title;
            lbDesc.innerText = desc;
            lightbox.style.display = 'flex';
        };

        window.closeLightbox = function(event) {
            if (event.target === lightbox || event.target.id === 'lightbox-close') {
                lightbox.style.display = 'none';
            }
        };

        window.renderArt = function(dataArray) {
            var container = document.getElementById('art-feed');
            if (!container) return;

            if (!dataArray || dataArray.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #8382ad; margin-top: 20px;">no art found.</p>';
                return;
            }

            var gridHTML = '<div class="gallery-grid">';
            dataArray.forEach(function(item) {
                var safeTitle = escapeHTML(item.title);
                var safeImg = escapeHTML(item.image);
                var safeDesc = escapeHTML(item.description);

                gridHTML += `
                    <div class="gallery-item" onclick="window.openLightbox('${safeTitle.replace(/'/g, "\\'")}', '${safeImg.replace(/'/g, "\\'")}', '${safeDesc.replace(/'/g, "\\'")}')">
                        <img src="${safeImg}" class="gallery-thumb" alt="${safeTitle}">
                        <div class="gallery-title">${safeTitle}</div>
                    </div>
                `;
            });
            gridHTML += '</div>';
            container.innerHTML = gridHTML;
        };

        // --- OC LOGIC ---
        var viewerBox = document.getElementById('main-oc-viewer');
        var viewerImg = document.getElementById('viewer-img');
        var viewerName = document.getElementById('viewer-name');
        var viewerDesc = document.getElementById('viewer-desc');

        window.selectOC = function(title, imgUrl, desc, iconElement) {
            viewerImg.src = imgUrl;
            viewerName.innerText = title;
            viewerDesc.innerText = desc;
            
            viewerBox.style.display = 'block';

            var allIcons = document.querySelectorAll('.oc-icon');
            allIcons.forEach(icon => icon.classList.remove('active'));
            iconElement.classList.add('active');
        };

        window.renderRoster = function(dataArray, containerId) {
            var container = document.getElementById(containerId);
            if (!container) return;

            if (!dataArray || dataArray.length === 0) {
                container.innerHTML = '<p style="color: #8382ad; font-size: 13px;">no characters here yet.</p>';
                return;
            }

            var html = '';
            dataArray.forEach(function(item) {
                var safeTitle = escapeHTML(item.title);
                var safeImg = escapeHTML(item.image);
                var safeDesc = escapeHTML(item.description);
                var iconId = 'icon-' + Math.random().toString(36).substr(2, 9);

                html += `
                    <img src="${safeImg}" 
                         id="${iconId}"
                         class="oc-icon" 
                         title="${safeTitle}" 
                         onclick="window.selectOC('${safeTitle.replace(/'/g, "\\'")}', '${safeImg.replace(/'/g, "\\'")}', '${safeDesc.replace(/'/g, "\\'")}', this)">
                `;
            });
            container.innerHTML = html;
        };

        // --- FILTER LOGIC ---
        window.filterGallery = function() {
            var query = document.getElementById('search-bar').value.toLowerCase();
            
            if (typeof artData !== 'undefined') {
                var filteredArt = artData.filter(function(item) {
                    return item.title.toLowerCase().includes(query) || item.description.toLowerCase().includes(query);
                });
                window.renderArt(filteredArt);
            }

            if (typeof ocsHumanData !== 'undefined') {
                var filteredHuman = ocsHumanData.filter(function(item) {
                    return item.title.toLowerCase().includes(query) || item.description.toLowerCase().includes(query);
                });
                window.renderRoster(filteredHuman, 'roster-human');
            }

            if (typeof ocsFantasyData !== 'undefined') {
                var filteredFantasy = ocsFantasyData.filter(function(item) {
                    return item.title.toLowerCase().includes(query) || item.description.toLowerCase().includes(query);
                });
                window.renderRoster(filteredFantasy, 'roster-fantasy');
            }

            viewerBox.style.display = 'none';
        };

        // --- LOAD ---
        if (typeof artData !== 'undefined') { window.renderArt(artData); } 
        if (typeof ocsHumanData !== 'undefined') { window.renderRoster(ocsHumanData, 'roster-human'); } 
        if (typeof ocsFantasyData !== 'undefined') { window.renderRoster(ocsFantasyData, 'roster-fantasy'); }
        
    </script>

</body>
</html>
