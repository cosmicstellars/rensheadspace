<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ren's headspace - art & ocs</title>
    
    <link rel="stylesheet" href="https://cdn.cursors-4u.net/cursors/animated/shiny-grey-star-4a7c7422-32.css">
    <link rel="stylesheet" href="/style.css?v=3">
    <link rel="icon" type="image/png" href="/img/Icon.png">

    <style>
        .section-title {
            text-align: center;
            font-size: 20px;
            font-weight: 900;
            color: #8e8cf0;
            margin: 30px 0 15px 0;
            letter-spacing: 1px;
            text-transform: lowercase;
        }

        /* --- TUMBLR/MYSPACE STYLE TABS --- */
        .tab-container {
            text-align: center;
            margin: 15px 0 25px 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #8382ad;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            padding: 5px 10px;
            transition: color 0.1s;
        }

        .tab-btn:hover {
            color: #8e8cf0;
        }

        .tab-btn.active {
            color: #b3b1f5;
            border-bottom: 2px dotted #b3b1f5;
        }

        .page-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .page-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- STYLIZED RETRO UNIVERSE TAGS --- */
        .universe-toggle {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .uni-btn {
            background-color: #ffffff;
            border: 1px solid #d1d8dc;
            color: #8382ad;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 12px;
            letter-spacing: 1px;
            cursor: pointer;
            padding: 6px 14px;
            transition: all 0.1s;
        }

        .uni-btn:hover {
            border-color: #b3b1f5;
            background-color: #f4f3ff;
            color: #8e8cf0;
        }

        .uni-btn.active {
            background-color: #b3b1f5;
            color: #ffffff;
            border-color: #b3b1f5;
            box-shadow: 2px 2px 0px #8e8cf0; 
            transform: translate(-2px, -2px);
        }

        .universe-section {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .universe-section.active {
            display: block;
        }

        /* --- NEW: POLAROID CARD STYLES --- */
        .oc-category-title {
            text-align: center;
            font-size: 15px;
            font-weight: 900;
            color: #ff6b81;
            margin: 40px 0 20px 0;
            border-bottom: 1px dashed #ffb8b8;
            display: block;
            padding-bottom: 5px;
        }

        .oc-roster {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .polaroid {
            background: #ffffff;
            padding: 12px 12px 20px 12px;
            border: 1px solid #e1e5e8;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.05);
            width: 220px;
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .polaroid:hover {
            transform: translateY(-5px) rotate(1deg);
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            border-color: #b3b1f5;
        }

        .polaroid-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border: 1px solid #f0f4f8;
            margin-bottom: 15px;
            background-color: #f7f9fa;
        }

        .polaroid-name {
            font-size: 18px;
            font-weight: 900;
            color: #4a4a4a;
            margin: 0 0 5px 0;
            line-height: 1.2;
        }

        .polaroid-species {
            font-size: 11px;
            font-weight: 800;
            color: #ff6b81;
            margin: 0 0 10px 0;
            opacity: 0.8;
            text-transform: lowercase;
            letter-spacing: 1px;
        }

        .polaroid-desc {
            font-size: 13px;
            color: #666;
            margin: 0;
            line-height: 1.5;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div id="lightbox" onclick="closeLightbox(event)">
        <button id="lightbox-close" onclick="closeLightbox(event)" title="Close">✖</button>
        <div id="lightbox-content-box">
            <img id="lightbox-img" src="" alt="Creation Image">
            <div id="lightbox-title"></div>
            <div id="lightbox-desc"></div>
        </div>
    </div>

    <div id="star-field"></div>

    <div class="wrapper">
        <div class="header">
            <h1>ren's headspace</h1>
        </div>

        <div class="nav-bar">
            [<a href="/" style="margin: 0 4px;">home</a>] 
            [<a href="/creations" style="margin: 0 4px;">art & ocs</a>] 
            [<a href="/projects" style="margin: 0 4px;">games & dev</a>] 
            [<a href="#" style="margin: 0 4px;">downloads</a>]
        </div>

        <div class="search-container">
            <span class="search-prompt">&gt;</span>
            <input type="text" id="search-bar" placeholder="query database..." onkeyup="filterGallery()">
        </div>

        <div class="tab-container">
            <button class="tab-btn active" id="btn-art" onclick="switchTab('art')">gallery</button>
            <button class="tab-btn" id="btn-ocs" onclick="switchTab('ocs')">ocs</button>
        </div>

        <div id="section-art" class="page-section active">
            <div class="gallery-container" id="art-feed">
                <p style="text-align: center; color: #8382ad;">loading art...</p>
            </div>
        </div>

        <div id="section-ocs" class="page-section">
            
            <div class="universe-toggle">
                <button class="uni-btn active" id="btn-uni-human" onclick="switchUniverse('human')">human universe</button>
                <button class="uni-btn" id="btn-uni-fantasy" onclick="switchUniverse('fantasy')">fantasy universe</button>
            </div>

            <div id="uni-human" class="universe-section active">
                <div id="roster-human-container">
                    <p style="color: #8382ad; font-size: 13px; text-align: center;">loading roster...</p>
                </div>
            </div>

            <div id="uni-fantasy" class="universe-section">
                <div id="roster-fantasy-container">
                    <p style="color: #8382ad; font-size: 13px; text-align: center;">loading roster...</p>
                </div>
            </div>
            
        </div>
        
        <br><br>
    </div>

    <script>
        var starField = document.getElementById('star-field');
        if (starField) {
            for (var i = 0; i < 100; i++) {
                var star = document.createElement('div');
                star.className = 'bg-star';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                var size = (Math.random() * 2 + 1) + 'px';
                star.style.width = size; star.style.height = size;
                star.style.animationDuration = (Math.random() * 3 + 1.5) + 's';
                star.style.animationDelay = (Math.random() * 5) + 's';
                starField.appendChild(star);
            }
        }

        var colors = ['#ffffff', '#cccccc', '#8e8cf0', '#c4c3f5'];
        var activeParticles = 0;
        var lastSpawn = 0;

        document.addEventListener('mousemove', function(e) {
            var now = Date.now();
            if (now - lastSpawn < 30 || activeParticles > 30) return;
            lastSpawn = now;
            var particle = document.createElement('div');
            particle.className = 'trail-particle';
            particle.style.left = e.pageX + 'px'; particle.style.top = e.pageY + 'px';
            particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            document.body.appendChild(particle);
            activeParticles++;
            setTimeout(function() { particle.style.transform = 'translate(-50%, -50%) scale(0) translateY(20px) rotate(45deg)'; particle.style.opacity = '0'; }, 10);
            setTimeout(function() { particle.remove(); activeParticles--; }, 600);
        });
    </script>

    <script src="/creations.js?v=6"></script>
    <script src="/ocs.js?v=2"></script>

    <script>
        function switchTab(tabId) {
            document.getElementById('btn-art').classList.remove('active');
            document.getElementById('btn-ocs').classList.remove('active');
            document.getElementById('btn-' + tabId).classList.add('active');

            document.getElementById('section-art').classList.remove('active');
            document.getElementById('section-ocs').classList.remove('active');
            document.getElementById('section-' + tabId).classList.add('active');

            document.getElementById('search-bar').value = '';
            filterGallery();
        }

        function switchUniverse(uniId) {
            document.getElementById('btn-uni-human').classList.remove('active');
            document.getElementById('btn-uni-fantasy').classList.remove('active');
            document.getElementById('btn-uni-' + uniId).classList.add('active');

            document.getElementById('uni-human').classList.remove('active');
            document.getElementById('uni-fantasy').classList.remove('active');
            document.getElementById('uni-' + uniId).classList.add('active');
        }

        function escapeHTML(str) {
            if (!str) return "";
            return str.replace(/[&<>"']/g, function(match) {
                switch (match) {
                    case '&': return '&amp;';
                    case '<': return '&lt;';
                    case '>': return '&gt;';
                    case '"': return '&quot;';
                    case "'": return '&#039;';
                    default: return match;
                }
            });
        }

        var lightbox = document.getElementById('lightbox');
        var lbImg = document.getElementById('lightbox-img');
        var lbTitle = document.getElementById('lightbox-title');
        var lbDesc = document.getElementById('lightbox-desc');

        window.openLightbox = function(title, imgUrl, desc) {
            lbImg.src = imgUrl;
            lbTitle.innerText = title;
            lbDesc.innerText = desc;
            lightbox.style.display = 'flex';
        };

        window.closeLightbox = function(event) {
            if (event.target === lightbox || event.target.id === 'lightbox-close') {
                lightbox.style.display = 'none';
            }
        };

        window.renderArt = function(dataArray) {
            var container = document.getElementById('art-feed');
            if (!container) return;

            if (!dataArray || dataArray.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #8382ad; margin-top: 20px;">no art found.</p>';
                return;
            }

            var gridHTML = '<div class="gallery-grid">';
            dataArray.forEach(function(item) {
                var safeTitle = escapeHTML(item.title);
                var safeImg = escapeHTML(item.image);
                var safeDesc = escapeHTML(item.description);

                gridHTML += `
                    <div class="gallery-item" onclick="window.openLightbox('${safeTitle.replace(/'/g, "\\'")}', '${safeImg.replace(/'/g, "\\'")}', '${safeDesc.replace(/'/g, "\\'")}')">
                        <img src="${safeImg}" class="gallery-thumb" alt="${safeTitle}">
                        <div class="gallery-title">${safeTitle}</div>
                    </div>
                `;
            });
            gridHTML += '</div>';
            container.innerHTML = gridHTML;
        };

        // --- UPDATED: ALL INFO DRAWN DIRECTLY ON THE CARDS ---
        window.renderRoster = function(dataArray, containerId) {
            var container = document.getElementById(containerId);
            if (!container) return;

            if (!dataArray || dataArray.length === 0) {
                container.innerHTML = '<p style="color: #8382ad; font-size: 13px; text-align: center;">no characters here yet.</p>';
                return;
            }

            var groupedData = {};
            dataArray.forEach(function(item) {
                var cat = item.category || "uncategorized";
                if (!groupedData[cat]) {
                    groupedData[cat] = [];
                }
                groupedData[cat].push(item);
            });

            var html = '';
            
            for (var category in groupedData) {
                if (category !== "uncategorized") {
                    html += `<div class="oc-category-title">✦ ${escapeHTML(category)} ✦</div>`;
                }

                html += `<div class="oc-roster">`;
                
                groupedData[category].forEach(function(item) {
                    var safeTitle = escapeHTML(item.title);
                    var safeImg = escapeHTML(item.image);
                    var safeDesc = escapeHTML(item.description);
                    var safeSpecies = item.species ? escapeHTML(item.species) : "";
                    
                    var speciesHtml = safeSpecies ? `<p class="polaroid-species">✦ ${safeSpecies} ✦</p>` : "";

                    // Clicking the card now opens the standard lightbox!
                    html += `
                        <div class="polaroid" onclick="window.openLightbox('${safeTitle.replace(/'/g, "\\'")}', '${safeImg.replace(/'/g, "\\'")}', '${safeDesc.replace(/'/g, "\\'")}')">
                            <img src="${safeImg}" class="polaroid-img" alt="${safeTitle}">
                            <h3 class="polaroid-name">${safeTitle}</h3>
                            ${speciesHtml}
                            <p class="polaroid-desc">${safeDesc}</p>
                        </div>
                    `;
                });
                
                html += `</div>`;
            }

            container.innerHTML = html;
        };

        window.filterGallery = function() {
            var query = document.getElementById('search-bar').value.toLowerCase();
            
            if (typeof artData !== 'undefined') {
                var filteredArt = artData.filter(function(item) {
                    return item.title.toLowerCase().includes(query) || item.description.toLowerCase().includes(query);
                });
                window.renderArt(filteredArt);
            }

            if (typeof ocsHumanData !== 'undefined') {
                var filteredHuman = ocsHumanData.filter(function(item) {
                    return item.title.toLowerCase().includes(query) || item.description.toLowerCase().includes(query) || (item.category && item.category.toLowerCase().includes(query));
                });
                window.renderRoster(filteredHuman, 'roster-human-container');
            }

            if (typeof ocsFantasyData !== 'undefined') {
                var filteredFantasy = ocsFantasyData.filter(function(item) {
                    return item.title.toLowerCase().includes(query) || item.description.toLowerCase().includes(query) || (item.category && item.category.toLowerCase().includes(query)) || (item.species && item.species.toLowerCase().includes(query));
                });
                window.renderRoster(filteredFantasy, 'roster-fantasy-container');
            }
        };

        // --- INITIAL LOAD ---
        if (typeof artData !== 'undefined') { window.renderArt(artData); } 
        if (typeof ocsHumanData !== 'undefined') { window.renderRoster(ocsHumanData, 'roster-human-container'); } 
        if (typeof ocsFantasyData !== 'undefined') { window.renderRoster(ocsFantasyData, 'roster-fantasy-container'); }
        
    </script>

</body>
</html>
