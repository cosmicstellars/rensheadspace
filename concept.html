<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ren's headspace - concepts</title>
    
    <link rel="stylesheet" href="https://cdn.cursors-4u.net/cursors/animated/shiny-grey-star-4a7c7422-32.css">
    <link rel="stylesheet" href="./style.css?v=3">
    <link rel="icon" type="image/png" href="./img/Icon.png">
</head>
<body>

    <div id="star-field"></div>

    <div class="wrapper">
        
        <div class="header">
            <h1>ren's headspace</h1>
        </div>

        <div class="nav-bar">
            [ <a href="/">home</a> ] 
            [ <a href="/creations">art & ocs</a> ] 
            [ <a href="/projects">games & dev</a> ] 
            [ <a href="#">downloads</a> ]
        </div>

        <div class="columns">
            
            <div class="left-col">
                </div>

            <div class="right-col">
                </div>

        </div>
    </div>

    <script>
        var starField = document.getElementById('star-field');
        if (starField) {
            for (var i = 0; i < 100; i++) {
                var star = document.createElement('div');
                star.className = 'bg-star';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                var size = (Math.random() * 2 + 1) + 'px';
                star.style.width = size; star.style.height = size;
                star.style.animationDuration = (Math.random() * 3 + 1.5) + 's';
                star.style.animationDelay = (Math.random() * 5) + 's';
                starField.appendChild(star);
            }
        }

        var colors = ['#ffffff', '#cccccc', '#8e8cf0', '#c4c3f5'];
        var activeParticles = 0;
        var lastSpawn = 0;

        document.addEventListener('mousemove', function(e) {
            var now = Date.now();
            if (now - lastSpawn < 30 || activeParticles > 30) return;
            lastSpawn = now;

            var particle = document.createElement('div');
            particle.className = 'trail-particle';
            
            particle.style.left = e.pageX + 'px';
            particle.style.top = e.pageY + 'px';
            particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            document.body.appendChild(particle);
            activeParticles++;

            setTimeout(function() {
                particle.style.transform = 'translate(-50%, -50%) scale(0) translateY(20px) rotate(45deg)';
                particle.style.opacity = '0';
            }, 10);

            setTimeout(function() {
                particle.remove();
                activeParticles--;
            }, 600);
        });
    </script>

</body>
</html>
